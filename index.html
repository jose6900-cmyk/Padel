<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marcador Pádel Pro</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
body{
  background:#000;
  color:white;
  font-family:-apple-system;
  text-align:center;
  margin:0;
}
.header{
  display:flex;
  justify-content:space-around;
  margin:4px 0;
  font-size:14px;
}
.header div span{
  font-size:16px;
  font-weight:bold;
}
.score{
  margin:8px 0;
  font-size:26px;
}
.score span{
  font-size:36px;
  margin:0 12px;
  font-weight:bold;
  transition: transform 0.3s;
}
.flash{
  transform: scale(1.5);
  transition: transform 0.3s;
}
.summary{
  margin-top:12px;
  font-size:16px;
}
.summary table{
  width:95%;
  margin:auto;
  border-collapse: collapse;
}
.summary th, .summary td{
  border:1px solid #fff;
  padding:5px;
  font-size:16px;
  text-align:center;
}
button{
  width:95%;
  margin:4px;
  padding:18px;
  font-size:22px;
  border-radius:14px;
  border:none;
  color:white;
}
#a{background:#34c759;} /* verde */
#b{background:#0055aa;} /* azul oscuro */
.small{
  font-size:14px;
  padding:10px;
  background:#333;
  color:white;
}
</style>
</head>
<body>

<div class="header">
  <div class="sets">
    SETS: <span id="setsA">0</span> - <span id="setsB">0</span>
  </div>
  <div class="games">
    JUEGOS: <span id="gamesA">0</span> - <span id="gamesB">0</span>
  </div>
</div>

<div class="score">
PUNTOS:<br>
<span id="pointsA">0</span> - <span id="pointsB">0</span>
</div>

<div class="summary" id="summary"></div>

<button id="a" onclick="point('A')">EQUIPO A</button>
<button id="b" onclick="point('B')">EQUIPO B</button>

<button class="small" onclick="confirmReset()">🔄 Nuevo partido</button>
<button class="small" onclick="undo()">↩︎ Deshacer</button>

<script>
let pA=0,pB=0,gA=0,gB=0,sA=0,sB=0;
let history=[];
let setsHistory=[];
const names=["0","15","30","40"];

function save(){ history.push([pA,pB,gA,gB,sA,sB]); }

function undo(){
  let h=history.pop();
  if(!h) return;
  [pA,pB,gA,gB,sA,sB]=h;
  update();
}

// Doble confirmación para reiniciar
function confirmReset(){
  if(confirm("¿Seguro que quieres reiniciar el partido?")){
    if(confirm("Confirma de nuevo para reiniciar el partido")){
      reset();
    }
  }
}

function reset(){
  pA=pB=gA=gB=sA=sB=0;
  history=[];
  setsHistory=[];
  document.getElementById("summary").innerHTML="";
  update();
}

function update(flashTeam=null){
  document.getElementById("pointsA").innerHTML = (gA==6 && gB==6)?pA:(names[pA]??pA);
  document.getElementById("pointsB").innerHTML = (gA==6 && gB==6)?pB:(names[pB]??pB);
  document.getElementById("gamesA").innerHTML = gA;
  document.getElementById("gamesB").innerHTML = gB;
  document.getElementById("setsA").innerHTML = sA;
  document.getElementById("setsB").innerHTML = sB;

  document.getElementById("pointsA").style.color = "#34c759";
  document.getElementById("pointsB").style.color = "#0055aa";
  document.getElementById("gamesA").style.color = "#34c759";
  document.getElementById("gamesB").style.color = "#0055aa";
  document.getElementById("setsA").style.color = "#34c759";
  document.getElementById("setsB").style.color = "#0055aa";

  if(flashTeam){
    let el = flashTeam === 'A' ? document.getElementById("pointsA") : document.getElementById("pointsB");
    el.classList.add("flash");
    setTimeout(()=>el.classList.remove("flash"),300);
  }
}

function winGame(team){
  if(team=="A") gA++; else gB++;
  pA=0; pB=0;
  if((gA>=6||gB>=6)&&Math.abs(gA-gB)>=2) winSet(team);
  if(gA==7||gB==7) winSet(team);
  update();
}

function winSet(team){
  setsHistory.push({A:gA,B:gB});
  if(team=="A") sA++; else sB++;
  gA=0; gB=0; pA=0; pB=0;
  update();
  if(sA==2||sB==2){
    let winner = sA > sB ? "EQUIPO A" : "EQUIPO B";
    showSummary(winner);
  }
}

function showSummary(winner){
  let summaryText = "<h3>🏆 Ganador: " + winner + "</h3>";
  summaryText += "<table><tr><th>Set</th><th>A</th><th>B</th></tr>";
  setsHistory.forEach((set,i)=>{
    let colorA = set.A > set.B ? "#34c759" : "#0055aa";
    let colorB = set.B > set.A ? "#0055aa" : "#34c759";
    summaryText += "<tr><td>"+(i+1)+"</td><td style='color:"+colorA+"'>"+set.A+"</td><td style='color:"+colorB+"'>"+set.B+"</td></tr>";
  });
  summaryText += "</table>";
  summaryText += "<p>Total Sets: <span style='color:#34c759'>A "+sA+"</span> - <span style='color:#0055aa'>B "+sB+"</span></p>";
  document.getElementById("summary").innerHTML = summaryText;
}

function point(team){
  save();
  if(gA==6 && gB==6){
    if(team=="A") pA++; else pB++;
    if((pA>=7||pB>=7)&&Math.abs(pA-pB)>=2) winGame(team);
    update(team);
    return;
  }
  if(team=="A"){ if(pA<3) pA++; else winGame("A"); }
  else{ if(pB<3) pB++; else winGame("B"); }
  update(team);
}

update();
</script>
</body>
</html>
