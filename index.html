<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
background:#000;
color:white;
font-family:-apple-system;
text-align:center;
margin:0;
}

.score{
font-size:28px;
margin-top:5px;
}

.games{
font-size:24px;
}

.sets{
font-size:18px;
}

button{
width:95%;
margin:4px;
padding:18px;
font-size:22px;
border-radius:14px;
border:none;
}

#a{background:#0a84ff;color:white;}
#b{background:#ff453a;color:white;}

.small{
font-size:14px;
padding:10px;
background:#333;
}

</style>
</head>

<body>

<div class="sets">
SETS<br>
<span id="setsA">0</span> - <span id="setsB">0</span>
</div>

<div class="games">
JUEGOS<br>
<span id="gamesA">0</span> - <span id="gamesB">0</span>
</div>

<div class="score">
<span id="pointsA">0</span> - <span id="pointsB">0</span>
</div>

<button id="a" onclick="point('A')">EQUIPO A</button>
<button id="b" onclick="point('B')">EQUIPO B</button>

<button class="small" onclick="undo()">↩︎ Deshacer</button>
<button class="small" onclick="reset()">🔄 Nuevo</button>

<script>

let pA=0,pB=0
let gA=0,gB=0
let sA=0,sB=0
let history=[]

const names=["0","15","30","40"]

function save(){
history.push([pA,pB,gA,gB,sA,sB])
}

function undo(){
let h=history.pop()
if(!h)return
[pA,pB,gA,gB,sA,sB]=h
update()
}

function reset(){
pA=pB=gA=gB=sA=sB=0
history=[]
update()
}

function update(){

document.getElementById("pointsA").innerHTML=(gA==6&&gB==6)?pA:names[pA]??pA
document.getElementById("pointsB").innerHTML=(gA==6&&gB==6)?pB:names[pB]??pB

document.getElementById("gamesA").innerHTML=gA
document.getElementById("gamesB").innerHTML=gB

document.getElementById("setsA").innerHTML=sA
document.getElementById("setsB").innerHTML=sB
}

function winGame(t){

if(t=="A")gA++
else gB++

pA=pB=0

if((gA>=6||gB>=6)&&Math.abs(gA-gB)>=2){
winSet(t)
}

if(gA==7||gB==7){
winSet(t)
}

update()
}

function winSet(t){

if(t=="A")sA++
else sB++

gA=gB=0

if(sA==2||sB==2){
alert("Partido terminado")
}

}

function point(t){

save()

// tie break
if(gA==6&&gB==6){

if(t=="A")pA++
else pB++

if((pA>=7||pB>=7)&&Math.abs(pA-pB)>=2){
winGame(t)
}

update()
return
}

// normal

if(t=="A"){

if(pA<3)pA++
else winGame("A")

}else{

if(pB<3)pB++
else winGame("B")

}

if(pA==3&&pB==3){
}

update()

}

update()

</script>

</body>
</html>
